<!DOCTYPE html>
<html>

<head>

    <title>Cloud ML Platform</title>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: 'Inter', sans-serif;

            background: #0f172a;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            color: white;
        }

        .login-container {

            width: 400px;

            background: #111827;

            padding: 50px;

            border-radius: 18px;

            box-shadow: 0 15px 40px rgba(0,0,0,0.4);

            text-align: center;
        }

        h1 {

            font-size: 2rem;

            margin-bottom: 10px;

            font-weight: 600;
        }

        .subtitle {

            color: #94a3b8;

            margin-bottom: 35px;

            font-size: 14px;
        }

        input {

            width: 100%;

            padding: 14px;

            margin-bottom: 18px;

            border: 1px solid #1e293b;

            border-radius: 10px;

            background: #0f172a;

            color: white;

            font-size: 14px;

            outline: none;

            transition: 0.3s;
        }

        input:focus {

            border-color: #64748b;
        }

        button {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: white;

            color: black;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #d1d5db;
        }

        .error {

            margin-top: 15px;

            color: #f87171;

            font-size: 14px;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h1>Cloud ML Platform</h1>

        <div class="subtitle">

            Secure access to machine learning deployment infrastructure

        </div>

        <form action="/login" method="post">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Sign In

            </button>

        </form>

        {% if error %}

            <div class="error">

                {{ error }}

            </div>

        {% endif %}

    </div>

</body>

</html>
